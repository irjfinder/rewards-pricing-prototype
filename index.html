<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Hello World Prototype</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f6f7f9;
    }
    button {
      font-size: 1rem;
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 6px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }
    button:hover { background: #1d4ed8; }
    #message {
      margin-top: 1.5rem;
      font-size: 1.5rem;
      color: #111;
      min-height: 2rem;
    }
  </style>
</head>
<body>
  <button id="greet">Click me</button>
  <div id="message"></div>

  <script>
    document.getElementById("greet").addEventListener("click", () => {
      document.getElementById("message").textContent = "hello world";
    });
  </script>
</body>
</html>
